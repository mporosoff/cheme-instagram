<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit to @ur.cheme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C1B19; --ink-soft:#4A4640; --paper:#F4F2ED; --card:#FFFFFF;
    --line:#E2DDD3; --line-strong:#CFC8BA; --slate:#5B6B73;
    --glow:#D6531F; --glow-soft:#F0A878; --glow-bg:#FBEAE0; --green:#2E6B4F;
    --shadow:0 1px 2px rgba(28,27,25,.05), 0 10px 30px rgba(28,27,25,.07);
  }
  /* ====================================================================== */
  /*  CONFIG — paste your Apps Script Web App URL here after deploying it.   */
  /*  (See SETUP.md, Part A, step 4.)                                       */
  /* ====================================================================== */
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;padding:24px 16px 60px;}
  .wrap{max-width:560px;margin:0 auto;}
  .head{display:flex;align-items:center;gap:13px;margin-bottom:6px;}
  .reactor{width:38px;height:38px;border-radius:9px;flex:none;background:radial-gradient(circle at 50% 120%, var(--glow) 0%, #8A2B0C 65%, #3A1404 100%);box-shadow:0 0 0 1px rgba(0,0,0,.1), 0 0 16px -2px var(--glow);position:relative;}
  .reactor::after{content:"";position:absolute;inset:8px 8px auto 8px;height:3px;border-radius:2px;background:linear-gradient(90deg,#FFD9A8,#FF7A33);}
  h1{font-family:"Space Grotesk",sans-serif;font-size:23px;margin:0;letter-spacing:-.01em;}
  .sub{color:var(--slate);font-size:14px;margin:2px 0 22px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:22px;}
  label.fld{display:block;margin-bottom:16px;}
  .lab{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .lab .req{color:var(--glow);}
  .lab .hint{font-weight:400;color:var(--slate);}
  input[type=text],input[type=date],textarea{width:100%;font-family:inherit;font-size:16px;color:var(--ink);padding:11px 13px;border:1px solid var(--line-strong);border-radius:9px;background:#fff;}
  textarea{resize:vertical;min-height:96px;line-height:1.5;}
  input:focus,textarea:focus,button:focus-visible{outline:2px solid var(--glow);outline-offset:2px;}
  .types{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .type{padding:11px 6px;border:1px solid var(--line);border-radius:9px;background:var(--paper);font-size:13px;font-weight:500;color:var(--ink-soft);cursor:pointer;text-align:center;transition:.12s;}
  .type:hover{border-color:var(--line-strong);}
  .type.on{background:var(--glow-bg);border-color:var(--glow);color:#8A2B0C;}
  .drop{border:1.5px dashed var(--line-strong);border-radius:10px;padding:20px;text-align:center;color:var(--slate);font-size:14px;cursor:pointer;background:var(--paper);transition:.12s;}
  .drop:hover{border-color:var(--glow);color:var(--glow);}
  .preview{margin-top:10px;display:none;}
  .preview img{max-width:100%;max-height:220px;border-radius:9px;border:1px solid var(--line);}
  .preview button{margin-top:6px;background:none;border:none;color:var(--glow);font:inherit;font-size:13px;cursor:pointer;}
  .consent{display:flex;gap:10px;align-items:flex-start;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:13px;font-size:13.5px;color:var(--ink-soft);}
  .consent input{margin-top:3px;width:18px;height:18px;flex:none;accent-color:var(--glow);}
  .submit{width:100%;margin-top:6px;padding:14px;border:none;border-radius:10px;background:var(--glow);color:#fff;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:16px;cursor:pointer;transition:.12s;}
  .submit:hover{background:#BC4716;}
  .submit:disabled{background:var(--glow-soft);cursor:not-allowed;}
  .hide{display:none !important;}
  .done{text-align:center;padding:40px 16px;}
  .done .check{width:56px;height:56px;border-radius:50%;background:var(--green);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;}
  .done h2{font-family:"Space Grotesk";margin:0 0 6px;}
  .done p{color:var(--slate);margin:0 0 18px;}
  .done button{background:none;border:1px solid var(--line-strong);border-radius:9px;padding:10px 18px;font:inherit;font-weight:500;cursor:pointer;}
  .err{background:var(--glow-bg);border:1px solid var(--glow-soft);color:#8A2B0C;border-radius:9px;padding:11px 13px;font-size:13.5px;margin-top:12px;}
  .notice{background:#FFF7E8;border:1px solid #E8C97A;color:#7A5A12;border-radius:9px;padding:12px;font-size:13px;margin-bottom:18px;}
  .foot{text-align:center;color:var(--slate);font-size:12px;margin-top:20px;font-family:"IBM Plex Mono",monospace;}
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><div class="reactor" aria-hidden="true"></div><div><h1>Submit to @ur.cheme</h1></div></div>
  <p class="sub">Got a paper, an event, a photo, or a win to share? Send it here and it goes into the department's Instagram queue for review.</p>

  <div id="configNotice"></div>

  <div class="card" id="formCard">
    <label class="fld"><span class="lab">Your name <span class="req">*</span></span><input type="text" id="submitter" placeholder="Jordan Lee" autocomplete="name"></label>
    <label class="fld"><span class="lab">Credit / tag <span class="hint">(optional — your IG handle or how to credit you)</span></span><input type="text" id="credit" placeholder="@jordan.catalysis"></label>

    <label class="fld"><span class="lab">What is it? <span class="req">*</span></span>
      <div class="types" id="types"></div>
    </label>

    <label class="fld"><span class="lab">Title / one-line description <span class="req">*</span></span><input type="text" id="title" placeholder="e.g. New paper on Mo-carbide CO₂ conversion in JACS"></label>

    <div id="condEvent" class="hide">
      <label class="fld"><span class="lab">Date &amp; time</span><div style="display:flex;gap:10px"><input type="date" id="evDate" style="flex:1"><input type="text" id="evTime" placeholder="3:30 PM" style="flex:1"></div></label>
      <label class="fld"><span class="lab">Location</span><input type="text" id="evLoc" placeholder="Goergen Hall 101"></label>
    </div>
    <div id="condLink" class="hide">
      <label class="fld"><span class="lab">DOI or link</span><input type="text" id="link" placeholder="10.1021/jacs.xxxxxx  or  https://..."></label>
    </div>

    <label class="fld"><span class="lab">Details</span><textarea id="details" placeholder="Anything that helps us write a good caption — what's the finding, who's involved, why it matters..."></textarea></label>

    <label class="fld"><span class="lab">Photo <span class="hint">(optional — drag in or tap)</span></span>
      <div class="drop" id="drop">Tap to add a photo</div>
      <input type="file" id="file" accept="image/*" class="hide">
      <div class="preview" id="preview"><img id="previewImg" alt=""><br><button id="removeImg" type="button">Remove</button></div>
    </label>

    <label class="fld"><span class="lab">Video or large file? <span class="hint">paste a share link (Google Drive / Dropbox), not the file</span></span><input type="text" id="videoLink" placeholder="https://drive.google.com/..."></label>

    <label class="fld" style="margin-bottom:18px"><span class="consent"><input type="checkbox" id="consent"><span>I have the right to share this, and I'm OK with it being posted publicly to @ur.cheme. Anyone shown in a photo has agreed to appear.</span></span></label>

    <button class="submit" id="submitBtn">Send to the queue</button>
    <div id="formErr"></div>
  </div>

  <div class="card done hide" id="doneCard">
    <div class="check"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h2>Sent — thank you!</h2>
    <p>It's in the queue. Someone managing the account will review it before it posts.</p>
    <button id="anotherBtn">Submit another</button>
  </div>

  <div class="foot">Department of Chemical &amp; Sustainability Engineering</div>
</div>

<script>
/* ====== paste your deployed Apps Script Web App URL here ====== */
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzolNKeTVSiRYK5yX2A3D_LrpTKO1c-ewrXMCh2ZlmcQXIL_VwowM1_kXs3jTBgrETRMA/exec";
/* ============================================================== */

const TYPES = ["Paper","Event","Photo","Video","Shout-out"];
let activeType = "Paper", imageData = null, imageName = "", imageType = "";

function renderTypes(){
  const c = document.getElementById("types"); c.innerHTML="";
  TYPES.forEach(t=>{
    const b=document.createElement("div"); b.className="type"+(t===activeType?" on":""); b.textContent=t;
    b.onclick=()=>{activeType=t;renderTypes();conditionals();};
    c.appendChild(b);
  });
}
function conditionals(){
  document.getElementById("condEvent").className = activeType==="Event"?"":"hide";
  document.getElementById("condLink").className  = activeType==="Paper"?"":"hide";
}

const drop=document.getElementById("drop"), file=document.getElementById("file");
drop.onclick=()=>file.click();
drop.ondragover=e=>{e.preventDefault();drop.style.borderColor="var(--glow)";};
drop.ondragleave=()=>{drop.style.borderColor="";};
drop.ondrop=e=>{e.preventDefault();drop.style.borderColor="";readImg(e.dataTransfer.files[0]);};
file.onchange=e=>readImg(e.target.files[0]);
function readImg(f){
  if(!f||!f.type.startsWith("image/"))return;
  if(f.size>8*1024*1024){ showErr("That image is over 8 MB — please use a smaller one, or share a link instead."); return; }
  const r=new FileReader();
  r.onload=()=>{ imageData=r.result.split(",")[1]; imageType=f.type; imageName=f.name;
    document.getElementById("previewImg").src=r.result;
    document.getElementById("preview").style.display="block";
    drop.textContent="Photo added — tap to replace"; };
  r.readAsDataURL(f);
}
document.getElementById("removeImg").onclick=()=>{imageData=null;document.getElementById("preview").style.display="none";drop.textContent="Tap to add a photo";};

function val(id){const e=document.getElementById(id);return e?(e.value||"").trim():"";}
function showErr(m){document.getElementById("formErr").innerHTML=`<div class="err">${m}</div>`;}

document.getElementById("submitBtn").onclick=async function(){
  document.getElementById("formErr").innerHTML="";
  if(!val("submitter")) return showErr("Please add your name.");
  if(!val("title")) return showErr("Please add a title or short description.");
  if(!document.getElementById("consent").checked) return showErr("Please confirm you're OK with this being posted.");
  if(WEBAPP_URL.indexOf("PASTE_")===0) return showErr("This form isn't connected yet — the account manager needs to add the submission link (see SETUP.md).");

  const btn=this; btn.disabled=true; btn.textContent="Sending…";
  const payload={
    submitter:val("submitter"), credit:val("credit"), type:activeType, title:val("title"),
    details:val("details"), date:val("evDate"), time:val("evTime"), location:val("evLoc"),
    link:val("link"), videoLink:val("videoLink"),
    imageBase64:imageData||"", imageType, imageName, consent:true
  };
  try{
    await fetch(WEBAPP_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
    document.getElementById("formCard").classList.add("hide");
    document.getElementById("doneCard").classList.remove("hide");
    window.scrollTo({top:0,behavior:"smooth"});
  }catch(e){
    showErr("Couldn't send — check your connection and try again."); btn.disabled=false; btn.textContent="Send to the queue";
  }
};
document.getElementById("anotherBtn").onclick=()=>location.reload();

if(WEBAPP_URL.indexOf("PASTE_")===0){
  document.getElementById("configNotice").innerHTML=`<div class="notice"><b>Setup needed:</b> paste your Apps Script Web App URL into <code>WEBAPP_URL</code> near the top of this file's script (see SETUP.md, Part A).</div>`;
}
renderTypes(); conditionals();
</script>
</body>
</html>
