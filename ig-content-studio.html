<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dept IG Content Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@1,18,500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C1B19; --ink-soft:#4A4640; --paper:#F4F2ED; --card:#FFFFFF;
    --line:#E2DDD3; --line-strong:#CFC8BA; --slate:#5B6B73;
    --glow:#D6531F; --glow-soft:#F0A878; --glow-bg:#FBEAE0;
    --green:#2E6B4F; --green-bg:#E6F0EA;
    --radius:10px; --shadow:0 1px 2px rgba(28,27,25,.05), 0 8px 24px rgba(28,27,25,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .mono{font-family:"IBM Plex Mono",monospace;}
  h1,h2,h3,.display{font-family:"Space Grotesk",sans-serif;}

  header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 22px;background:rgba(244,242,237,.85);backdrop-filter:saturate(1.2) blur(8px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .reactor{width:30px;height:30px;border-radius:7px;flex:none;background:radial-gradient(circle at 50% 120%, var(--glow) 0%, #8A2B0C 65%, #3A1404 100%);box-shadow:0 0 0 1px rgba(0,0,0,.1), 0 0 14px -2px var(--glow);position:relative;}
  .reactor::after{content:"";position:absolute;inset:6px 6px auto 6px;height:3px;border-radius:2px;background:linear-gradient(90deg,#FFD9A8,#FF7A33);opacity:.9;}
  .brand h1{font-size:17px;font-weight:600;letter-spacing:-.01em;margin:0;white-space:nowrap;}
  .brand .sub{font-size:12px;color:var(--slate);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  header .acts{display:flex;align-items:center;gap:8px;flex:none;}

  button{font-family:inherit;font-size:14px;cursor:pointer;border:none;background:none;}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);font-weight:500;transition:.12s;}
  .btn:hover{border-color:var(--slate);}
  .btn.primary{background:var(--glow);border-color:var(--glow);color:#fff;}
  .btn.primary:hover{background:#BC4716;border-color:#BC4716;}
  .btn.primary:disabled{background:var(--glow-soft);border-color:var(--glow-soft);cursor:not-allowed;}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--slate);padding:8px 10px;}
  .btn.ghost:hover{color:var(--ink);background:rgba(0,0,0,.04);}
  .btn.sm{padding:6px 11px;font-size:13px;}
  .btn.green{background:var(--green);border-color:var(--green);color:#fff;}
  .btn.green:hover{background:#245540;border-color:#245540;}
  button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--glow);outline-offset:2px;}

  main{max-width:1240px;margin:0 auto;padding:22px;display:grid;grid-template-columns:1fr 1.15fr;gap:22px;align-items:start;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
  .panel-head{display:flex;align-items:center;gap:9px;padding:14px 18px;border-bottom:1px solid var(--line);}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);}
  .panel-body{padding:18px;}

  .types{display:grid;grid-template-columns:repeat(auto-fit,minmax(64px,1fr));gap:8px;margin-bottom:18px;}
  .type{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border:1px solid var(--line);border-radius:9px;background:var(--paper);font-size:12.5px;font-weight:500;color:var(--ink-soft);text-align:center;transition:.12s;}
  .type svg{width:20px;height:20px;}
  .type:hover{border-color:var(--line-strong);}
  .type.active{background:var(--glow-bg);border-color:var(--glow);color:#8A2B0C;}

  label.fld{display:block;margin-bottom:14px;}
  label.fld .lab{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  label.fld .hint{font-weight:400;color:var(--slate);}
  input[type=text],input[type=date],input[type=color],textarea,select{width:100%;font-family:inherit;font-size:14px;color:var(--ink);padding:9px 11px;border:1px solid var(--line-strong);border-radius:8px;background:#fff;}
  input[type=color]{height:38px;padding:4px;cursor:pointer;}
  textarea{resize:vertical;min-height:84px;line-height:1.5;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  .doi-row{display:flex;gap:8px;}
  .doi-row input{flex:1;}

  .meta-card{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:14px;font-size:13px;}
  .meta-card .t{font-weight:600;margin-bottom:3px;}
  .meta-card .m{color:var(--slate);}

  .drop{border:1.5px dashed var(--line-strong);border-radius:9px;padding:18px;text-align:center;color:var(--slate);font-size:13.5px;cursor:pointer;transition:.12s;background:var(--paper);}
  .drop:hover{border-color:var(--glow);color:var(--glow);}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .thumb{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .thumb button{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;}

  .glowbar{height:3px;border-radius:2px;background:var(--line);overflow:hidden;}
  .glowbar.on::before{content:"";display:block;height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--glow),#FFC78A,var(--glow),transparent);animation:ramp 1.1s ease-in-out infinite;}
  @keyframes ramp{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}

  /* draft panel */
  .out-empty{color:var(--slate);font-size:14px;text-align:center;padding:48px 14px;line-height:1.6;}
  .out-empty .reactor{margin:0 auto 14px;width:40px;height:40px;}
  .tabs{display:flex;gap:4px;padding:4px;background:var(--paper);border-radius:9px;margin-bottom:16px;}
  .tab{flex:1;padding:8px;border-radius:7px;font-weight:600;font-size:13.5px;color:var(--slate);text-align:center;}
  .tab.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow);}

  .caption-out{width:100%;min-height:140px;font-size:14.5px;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
  .tag{font-family:"IBM Plex Mono",monospace;font-size:12px;border-radius:6px;padding:3px 8px;}
  .tag.on{background:var(--glow-bg);border:1px solid var(--glow-soft);color:#8A2B0C;cursor:pointer;}
  .counts{display:flex;gap:16px;margin-top:12px;font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--slate);}
  .counts b{color:var(--ink);font-weight:500;}
  .counts .warn{color:var(--glow);}
  .alt{margin-top:14px;font-size:13px;color:var(--ink-soft);}
  .alt .lab{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);display:block;margin-bottom:4px;}
  .out-acts{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;}

  /* graphic tab */
  .canvas-wrap{display:flex;justify-content:center;background:var(--paper);border-radius:10px;padding:14px;border:1px solid var(--line);}
  #card{width:100%;max-width:340px;height:auto;border-radius:6px;box-shadow:var(--shadow);display:block;}
  .gctrls{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .gctrls .full{grid-column:1 / -1;}
  .gctrls label.fld{margin-bottom:0;}
  .seg{display:flex;gap:4px;padding:3px;background:var(--paper);border-radius:8px;}
  .seg button{flex:1;padding:6px;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--slate);}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow);}

  /* queue */
  .queue-wrap{max-width:1240px;margin:0 auto 40px;padding:0 22px;}
  .queue-head{display:flex;align-items:center;justify-content:space-between;margin:6px 0 14px;}
  .queue-head h2{font-size:16px;margin:0;}
  .qcount{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--slate);}
  .qlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .qcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;box-shadow:var(--shadow);}
  .qcard .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .pill{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px;background:var(--green-bg);color:var(--green);}
  .qcard .cap{font-size:13px;line-height:1.5;max-height:84px;overflow:hidden;color:var(--ink-soft);}
  .qcard .qacts{display:flex;gap:6px;margin-top:10px;}
  .qempty{color:var(--slate);font-size:13.5px;padding:8px 0;}

  .scrim{position:fixed;inset:0;background:rgba(28,27,25,.45);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50;}
  .modal{background:var(--card);border-radius:14px;max-width:480px;width:100%;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.3);max-height:90vh;overflow:auto;}
  .modal h2{margin:0 0 6px;font-size:19px;}
  .modal p{color:var(--ink-soft);font-size:13.5px;margin:0 0 16px;}
  .modal .note{font-size:12px;color:var(--slate);margin-top:12px;line-height:1.5;}
  .modal.wide{max-width:900px;}
  .review-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-top:14px;}
  .review-card{border:1px solid var(--line);border-radius:10px;padding:14px;background:var(--paper);}
  .review-card h3{font-size:15px;margin:7px 0 4px;line-height:1.3;}
  .review-card .meta{font-size:12px;color:var(--slate);}
  .review-card .desc{font-size:13px;color:var(--ink-soft);margin-top:8px;max-height:64px;overflow:hidden;}
  .review-card .actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
  .loaded-review{border-left:4px solid var(--glow);display:flex;justify-content:space-between;gap:12px;align-items:start;}
  .loaded-review button{color:var(--slate);font-size:12px;}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:13.5px;opacity:0;pointer-events:none;transition:.22s;z-index:60;box-shadow:var(--shadow);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .err{background:var(--glow-bg);border:1px solid var(--glow-soft);color:#8A2B0C;border-radius:8px;padding:10px 12px;font-size:13px;margin-top:12px;}
  .hide{display:none !important;}

  @media (max-width:900px){
    main{grid-template-columns:1fr;padding:14px;gap:14px;}
    .brand .sub{display:none;}
    .gctrls{grid-template-columns:1fr;}
    .panel-body{padding:15px;}
    input[type=text],input[type=date],textarea,select{font-size:16px;} /* stops iOS zoom-on-focus */
    .modal .row{flex-direction:column;gap:0;}
    .out-acts .btn{flex:1;justify-content:center;}
    #cardDisp{max-width:100% !important;}
  }
  @media (prefers-reduced-motion:reduce){ .glowbar.on::before{animation:none;width:100%;opacity:.5;} *{transition:none !important;} }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="reactor" aria-hidden="true"></div>
    <div style="min-width:0"><h1>Dept IG Content Studio</h1><div class="sub" id="brandSub">Source → caption + graphic → approve</div></div>
  </div>
  <div class="acts">
    <button class="btn ghost sm" id="reviewBtn">Review queue</button>
    <button class="btn ghost sm" id="settingsBtn">Voice &amp; brand</button>
    <button class="btn ghost sm" id="keyBtn">API key</button>
  </div>
</header>

<main>
  <section class="panel">
    <div class="panel-head"><span class="eyebrow">01 / Source</span></div>
    <div class="panel-body">
      <div class="types" id="types"></div>
      <div id="formArea"></div>
      <div class="glowbar" id="glowbar" style="margin-top:6px"></div>
      <button class="btn primary" id="draftBtn" style="margin-top:16px;width:100%;justify-content:center">Generate post</button>
      <div id="srcErr"></div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head"><span class="eyebrow">02 / Caption &amp; graphic</span></div>
    <div class="panel-body" id="outArea">
      <div class="out-empty">
        <div class="reactor" aria-hidden="true"></div>
        Add your material and hit <b>Generate post</b>.<br>
        You get an editable caption <i>and</i> a ready-to-post Instagram graphic.
      </div>
    </div>
  </section>
</main>

<div class="queue-wrap">
  <div class="queue-head"><h2>This browser's recent approvals</h2><span class="qcount" id="qcount"></span></div>
  <div class="qlist" id="qlist"></div>
</div>

<div class="toast" id="toast"></div>
<canvas id="card" width="1080" height="1080"></canvas>

<script>
/* ===== storage (graceful fallback) ===== */
const mem={};
function ssGet(k){try{return sessionStorage.getItem(k);}catch(e){return mem[k]??null;}}
function ssSet(k,v){try{sessionStorage.setItem(k,v);}catch(e){mem[k]=v;}}
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return mem[k]??null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}
function getApiKey(){return lsGet("igs2_key")||ssGet("igs2_key")||"";}
function setApiKey(key,remember){
  if(remember){lsSet("igs2_key",key);ssSet("igs2_key","");}
  else{ssSet("igs2_key",key);lsSet("igs2_key","");}
}
function forgetApiKey(){ssSet("igs2_key","");lsSet("igs2_key","");}
function getManagerToken(){return lsGet("igs2_manager_token")||ssGet("igs2_manager_token")||"";}
function setManagerToken(token,remember){
  if(remember){lsSet("igs2_manager_token",token);ssSet("igs2_manager_token","");}
  else{ssSet("igs2_manager_token",token);lsSet("igs2_manager_token","");}
}
function forgetManagerToken(){ssSet("igs2_manager_token","");lsSet("igs2_manager_token","");}

/* ===== settings ===== */
const DEFAULTS={
  dept:"Department of Chemical & Sustainability Engineering",
  handle:"@ur.cheme",
  voice:"Professional but warm and accessible. Curious and proud of the work. Plain language a smart undergrad or the public can follow; explain the 'why it matters' without hype.",
  hashtags:"ChemicalEngineering, Catalysis, Research, STEM, Engineering",
  length:"medium", model:"claude-sonnet-4-6",
  accent:"#D6531F", theme:"dark", logo:"", publishUrl:""
};
function getSettings(){try{return {...DEFAULTS,...JSON.parse(lsGet("igs2_settings")||"{}")};}catch(e){return {...DEFAULTS};}}
function saveSettings(s){lsSet("igs2_settings",JSON.stringify(s));applyBranding();}
function applyBranding(){document.getElementById("brandSub").textContent=getSettings().handle||"Source → caption + graphic → approve";}

/* ===== content types ===== */
const TYPES=[
  {id:"paper",label:"Paper",icon:'<path d="M5 3h9l5 5v13H5z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M14 3v5h5" fill="none" stroke="currentColor" stroke-width="1.6"/>'},
  {id:"event",label:"Event",icon:'<rect x="4" y="5" width="16" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4 9h16M9 3v4M15 3v4" stroke="currentColor" stroke-width="1.6"/>'},
  {id:"photo",label:"Photo",icon:'<rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="9" cy="11" r="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M5 18l5-4 4 3 3-3 2 2" fill="none" stroke="currentColor" stroke-width="1.6"/>'},
  {id:"repost",label:"Repost",icon:'<path d="M4 9V7a3 3 0 0 1 3-3h9l-2-2m2 2-2 2M20 15v2a3 3 0 0 1-3 3H8l2 2m-2-2 2-2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>'},
  {id:"reel",label:"Reel",icon:'<rect x="3" y="4" width="18" height="16" rx="3" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3 8h18M8 4l2.5 4M13 4l2.5 4" stroke="currentColor" stroke-width="1.6"/><path d="M10 12.5v3l3-1.5z" fill="currentColor"/>'}
];
let activeType="paper", photos=[], figure=null, paperMeta=null, reelCover=null, reelVideoLink="", reviewSource=null;

function renderTypes(){
  const c=document.getElementById("types");c.innerHTML="";
  TYPES.forEach(t=>{const b=document.createElement("button");b.className="type"+(t.id===activeType?" active":"");
    b.innerHTML=`<svg viewBox="0 0 24 24">${t.icon}</svg>${t.label}`;
    b.onclick=()=>{activeType=t.id;renderTypes();renderForm();};c.appendChild(b);});
}
function renderForm(){
  const a=document.getElementById("formArea");
  if(activeType==="paper"){
    a.innerHTML=`<label class="fld"><span class="lab">DOI <span class="hint">— auto-fetches title, authors & abstract</span></span>
      <div class="doi-row"><input type="text" id="doi" placeholder="10.1021/jacs.xxxxxx" autocomplete="off"><button class="btn sm" id="fetchDoi">Fetch</button></div></label>
      <div id="paperMetaBox"></div>
      <label class="fld"><span class="lab">Or paste the abstract / a one-line summary</span><textarea id="paperText" placeholder="Paste the abstract or describe the finding..."></textarea></label>
      <label class="fld"><span class="lab">Angle <span class="hint">(optional)</span></span><input type="text" id="paperAngle" placeholder="e.g. celebrate the grad-student first author"></label>
      ${figureSlot("Add a figure / TOC graphic (optional)")}`;
    if(paperMeta)renderPaperMeta();
    document.getElementById("fetchDoi").onclick=fetchDoi; wireFigure();
  } else if(activeType==="event"){
    a.innerHTML=`<label class="fld"><span class="lab">Event title</span><input type="text" id="evTitle" placeholder="Spring Seminar: Catalysis for a Carbon-Negative Future"></label>
      <div class="row"><label class="fld"><span class="lab">Date</span><input type="date" id="evDate"></label><label class="fld"><span class="lab">Time</span><input type="text" id="evTime" placeholder="3:30 PM"></label></div>
      <label class="fld"><span class="lab">Location</span><input type="text" id="evLoc" placeholder="Goergen Hall 101"></label>
      <label class="fld"><span class="lab">Details</span><textarea id="evDesc" placeholder="Speaker, topic, who should come, RSVP..."></textarea></label>
      <label class="fld"><span class="lab">Link <span class="hint">(optional)</span></span><input type="text" id="evLink" placeholder="https://..."></label>
      ${figureSlot("Add a speaker photo / poster (optional)")}`;
    wireFigure();
  } else if(activeType==="photo"){
    a.innerHTML=`<div class="drop" id="drop">Drop a photo or <b>click to upload</b><br><span style="font-size:12px">This image becomes the post — JPEG works best</span></div>
      <input type="file" id="fileInput" accept="image/*" class="hide">
      <div class="thumbs" id="thumbs"></div>
      <label class="fld" style="margin-top:14px"><span class="lab">What's in the photo? <span class="hint">(helps the caption)</span></span><textarea id="photoNote" placeholder="e.g. Undergrad running the pulsed-Joule reactor..."></textarea></label>`;
    const drop=document.getElementById("drop"),fi=document.getElementById("fileInput");
    drop.onclick=()=>fi.click();
    drop.ondragover=e=>{e.preventDefault();drop.style.borderColor="var(--glow)";};
    drop.ondragleave=()=>{drop.style.borderColor="";};
    drop.ondrop=e=>{e.preventDefault();drop.style.borderColor="";handlePhoto(e.dataTransfer.files);};
    fi.onchange=e=>handlePhoto(e.target.files); renderThumbs();
  } else if(activeType==="repost"){
    a.innerHTML=`<label class="fld"><span class="lab">Original author's handle</span><input type="text" id="rpHandle" placeholder="@labmate"></label>
      <label class="fld"><span class="lab">What did they post?</span><textarea id="rpWhat" placeholder="Paste their caption or describe the achievement..."></textarea></label>
      <label class="fld"><span class="lab">Why amplify it? <span class="hint">(optional)</span></span><input type="text" id="rpWhy" placeholder="e.g. best poster at AIChE"></label>
      ${figureSlot("Add their image (optional)")}
      <div class="err" style="background:var(--paper);border-color:var(--line);color:var(--slate)">Tip: get the person's OK before reposting, and credit them.</div>`;
    wireFigure();
  } else if(activeType==="reel"){
    a.innerHTML=`<label class="fld"><span class="lab">Google Drive video link <span class="hint">— MP4 or MOV under 60 MB; set to "anyone with the link"</span></span><input type="text" id="reelLink" placeholder="https://drive.google.com/file/d/..."></label>
      <div class="drop" id="reelDrop">Tap to add the clip — captures a background for the branded opening &amp; helps write the caption<br><span style="font-size:12px">Stays on your device; the generated cover is sent with the approved post</span></div>
      <input type="file" id="reelFile" accept="video/*" class="hide">
      <div class="thumbs" id="reelThumb"></div>
      <label class="fld" style="margin-top:14px"><span class="lab">What happens in the Reel? <span class="hint">(helps the caption)</span></span><textarea id="reelNote" placeholder="e.g. 15s walkthrough of the pulsed-Joule reactor lighting up..."></textarea></label>`;
    const drop=document.getElementById("reelDrop"),fi=document.getElementById("reelFile");
    drop.onclick=()=>fi.click();

function handleReel(f){
  if(!f||!f.type.startsWith("video/"))return;
  const drop=document.getElementById("reelDrop"); if(drop)drop.textContent="Reading the clip…";
  grabFrame(f).then(url=>{
    reelCover=url;
    if(drop)drop.innerHTML = url?"Cover frame captured ✓ — tap to use a different clip":"Couldn't read that clip — you can still caption from your note";
    renderReelThumb();
    if(currentGraphic){currentGraphic.figure=reelCover;drawCard("cardDisp");}
  });
}
function grabFrame(file){
  return new Promise(res=>{
    try{
      const v=document.createElement("video");v.muted=true;v.playsInline=true;v.preload="auto";v.src=URL.createObjectURL(file);
      v.onloadeddata=()=>{
        const duration=v.duration||2;
        v.currentTime=Math.max(0,Math.min(duration-0.1,Math.max(1,duration*0.25)));
      };
      v.onseeked=()=>{try{const c=document.createElement("canvas");c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);res(c.toDataURL("image/jpeg",0.9));}catch(e){res(null);}URL.revokeObjectURL(v.src);};
      v.onerror=()=>res(null);
    }catch(e){res(null);}
  });
}

/* ===== DOI via Crossref (slash-safe) ===== */
async function fetchDoi(){
  let raw=(document.getElementById("doi").value||"").trim().replace(/^https?:\/\/(dx\.)?doi\.org\//i,"");
  if(!raw){toast("Enter a DOI first");return;}
  const path=raw.split("/").map(encodeURIComponent).join("/"); // keep the slash
  const btn=document.getElementById("fetchDoi");btn.textContent="…";btn.disabled=true;
  try{
    const r=await fetch("https://api.crossref.org/works/"+path+"?mailto=studio@example.edu",{headers:{"Accept":"application/json"}});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const m=(await r.json()).message;
    const authorList=m.author||[];
    const auth=authorList.slice(0,4).map(a=>[a.given,a.family].filter(Boolean).join(" ")).join(", ")+(authorList.length>4?", et al.":"");
    const firstAuthor=authorList[0]?[authorList[0].given,authorList[0].family].filter(Boolean).join(" "):"";
    const authorCredit=firstAuthor+(authorList.length>1?" et al.":"");
    paperMeta={title:(m.title&&m.title[0])||"(untitled)",authors:auth||"",authorCredit:authorCredit,journal:(m["container-title"]&&m["container-title"][0])||"",year:(((m.published||{})["date-parts"]||[[]])[0]||[])[0]||"",abstract:(m.abstract||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim()};
    renderPaperMeta();
    if(paperMeta.abstract)document.getElementById("paperText").value=paperMeta.abstract;
    toast("Fetched ✓");
  }catch(e){console.error("DOI fetch failed:",e);toast("Couldn't fetch that DOI — paste the abstract instead");}
  btn.textContent="Fetch";btn.disabled=false;
}

/* ===== build brief ===== */
function buildBrief(){
  if(activeType==="paper"){
    const txt=val("paperText"),angle=val("paperAngle");
    if(!txt&&!paperMeta)return{error:"Add a DOI or paste an abstract first."};
    let b="CONTENT TYPE: New research paper highlight.\n";
    if(paperMeta)b+=`Title: ${paperMeta.title}\nAuthors: ${paperMeta.authors}\nJournal: ${paperMeta.journal} ${paperMeta.year}\n`;
    if(txt)b+=`Summary/abstract: ${txt}\n`; if(angle)b+=`Angle: ${angle}\n`;
    return{brief:b,meta1:paperMeta?(paperMeta.authorCredit||paperMeta.authors):"",meta2:paperMeta?(paperMeta.journal+(paperMeta.year?" · "+paperMeta.year:"")):"",eyebrow:"New publication"};
  }
  if(activeType==="event"){
    const title=val("evTitle"); if(!title)return{error:"Give the event a title first."};
    let b="CONTENT TYPE: Event / announcement.\nTitle: "+title+"\n";
    const date=val("evDate"),time=val("evTime"),loc=val("evLoc"),desc=val("evDesc"),link=val("evLink");
    if(date||time)b+=`When: ${date}${time?" "+time:""}\n`; if(loc)b+=`Where: ${loc}\n`; if(desc)b+=`Details: ${desc}\n`; if(link)b+=`Link: ${link}\n`;
    const dstr=date?new Date(date+"T00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}):"";
    return{brief:b,meta1:[dstr,time].filter(Boolean).join(" · "),meta2:loc,eyebrow:"Event",headlineHint:title};
  }
  if(activeType==="reel"){
    const note=val("reelNote"); reelVideoLink=extractDriveFileId(val("reelLink"));
    if(!reelVideoLink)return{error:"Add a valid Google Drive video link. The Make Reel route downloads the MP4 or MOV file from Drive."};
    let b="CONTENT TYPE: Instagram Reel (short vertical video). Write a Reel-style caption with a strong first-line hook"+(reelCover?" for the attached cover frame.":".")+"\n";
    if(note)b+=`What happens: ${note}\n`;
    return{brief:b,withImage:!!reelCover,meta1:getSettings().handle,meta2:"",eyebrow:"Reel"};
  }
  if(activeType==="photo"){
    const note=val("photoNote");
    let b="CONTENT TYPE: Photo post (lab life / people). Write a caption for the attached image.\n";
    if(note)b+=`Context: ${note}\n`;
    return{brief:b,withImage:true,meta1:getSettings().handle,meta2:"",eyebrow:""};
  }
  if(activeType==="repost"){
    const handle=val("rpHandle"),what=val("rpWhat");
    if(!what)return{error:"Describe what they posted first."};
    let b="CONTENT TYPE: Reposting a department member's content. Credit them clearly.\n";
    if(handle)b+=`Original author: ${handle}\n`; b+=`What they shared: ${what}\n`;
    const why=val("rpWhy"); if(why)b+=`Why amplify: ${why}\n`;
    return{brief:b,meta1:handle?"via "+handle:"",meta2:"",eyebrow:"Spotlight"};
  }
  return{error:"Pick a content type."};
}

/* ===== Claude ===== */
const LEN_GUIDE={short:"1–2 punchy sentences (~150 chars).",medium:"3–5 sentences (~125–300 chars — IG's sweet spot).",long:"a fuller caption up to ~600 chars with a short hook first."};
const MAX_HASHTAGS=10;
let lastBuilt=null;
async function draft(){
  const key=getApiKey(); if(!key){openKeyModal();return;}
  const built=buildBrief(); const errBox=document.getElementById("srcErr"); errBox.innerHTML="";
  if(built.error){errBox.innerHTML=`<div class="err">${built.error}</div>`;return;}
  if(reviewSource){
    built.brief+=`\nORIGINAL DEPARTMENT SUBMISSION:\nSubmitter: ${reviewSource.submitter||""}\nCredit: ${reviewSource.credit||""}\nTitle: ${reviewSource.title||""}\nDetails: ${reviewSource.details||""}\nLink: ${reviewSource.link||""}\n`;
  }
  lastBuilt=built;
  const s=getSettings();
  const sys=`You are the social-media editor for ${s.dept}${s.handle?` (Instagram ${s.handle})`:""}, a university engineering department.
You produce TWO things from each brief: (1) a feed CAPTION and (2) the short TEXT THAT GOES ON THE GRAPHIC ITSELF.
Voice: ${s.voice}
Rules: never overstate, hype, or fabricate a research claim; if a fact isn't given, don't invent it. No markdown. Emoji sparingly if it fits.
Caption length: ${LEN_GUIDE[s.length]||LEN_GUIDE.medium}
Graphic text must be SHORT and legible on a phone-sized post: headline punchy (<= 8 words), subhead a single clause.
Hashtags: use only relevant broad + niche/academic tags, no # symbol, max ${MAX_HASHTAGS}. Themes: ${s.hashtags}
Return ONLY valid JSON, no preamble, no code fences:
{"caption":string,"hashtags":[string],"alt_text":string,"headline":string,"subhead":string,"pull_quote":string}`;
  const content=[{type:"text",text:"Brief:\n\n"+built.brief}];
  if(built.withImage&&activeType==="reel"&&reelCover){content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:reelCover.split(",")[1]}});}
  else if(built.withImage)photos.forEach(p=>content.push({type:"image",source:{type:"base64",media_type:p.mediaType||"image/jpeg",data:p.dataUrl.split(",")[1]}}));
  setLoading(true);
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:s.model,max_tokens:1200,system:sys,messages:[{role:"user",content}]})});
    if(res.status===401){setLoading(false);errBox.innerHTML=`<div class="err">API key was rejected — check it under "API key".</div>`;return;}
    if(!res.ok){throw new Error((await res.text()).slice(0,160));}
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").replace(/```json|```/g,"").trim();
    let p; try{p=JSON.parse(text);}catch(e){const m=text.match(/\{[\s\S]*\}/);p=m?JSON.parse(m[0]):{caption:text,hashtags:[],alt_text:"",headline:"",subhead:"",pull_quote:""};}
    initOutput(p,built);
  }catch(e){errBox.innerHTML=`<div class="err">Something went wrong: ${esc(String(e.message||e).slice(0,160))}</div>`;}
  setLoading(false);
}

let fontsReady=false;
async function ensureFonts(){if(fontsReady)return;try{await Promise.all([document.fonts.load("700 80px 'Space Grotesk'"),document.fonts.load("600 40px 'Space Grotesk'"),document.fonts.load("500 34px 'IBM Plex Sans'"),document.fonts.load("500 26px 'IBM Plex Mono'"),document.fonts.load("500 italic 40px 'Newsreader'")]);await document.fonts.ready;}catch(e){}fontsReady=true;}
function loadImg(src){return new Promise(res=>{if(!src)return res(null);const i=new Image();i.onload=()=>res(i);i.onerror=()=>res(null);i.src=src;});}
function wrap(ctx,text,maxW){const words=String(text||"").split(/\s+/);const lines=[];let line="";for(const w of words){const test=line?line+" "+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w;}else line=test;}if(line)lines.push(line);return lines;}
function fitLines(ctx,text,{maxW,maxH,weight,family,max,min,lh}){let size=max;for(;size>=min;size-=2){ctx.font=`${weight} ${size}px ${family}`;const lines=wrap(ctx,text,maxW);if(lines.length*size*lh<=maxH)return{size,lines};}ctx.font=`${weight} ${min}px ${family}`;return{size:min,lines:wrap(ctx,text,maxW)};}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function coverDraw(ctx,img,x,y,w,h){const ir=img.width/img.height,r=w/h;let sw,sh,sx,sy;if(ir>r){sh=img.height;sw=sh*r;sx=(img.width-sw)/2;sy=0;}else{sw=img.width;sh=sw/r;sx=0;sy=(img.height-sh)/2;}ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);}
function graphicSize(template){
  if(template==="reel")return{width:1080,height:1920,label:"1080×1920"};
  if(template==="photo")return{width:1080,height:1350,label:"1080×1350"};
  return{width:1080,height:1080,label:"1080×1080"};
}

async function drawCard(canvasId){
  await ensureFonts();

  const canvas=document.getElementById(canvasId||"cardDisp")||document.getElementById("card");
  const reel=(g.template==="reel");
  const size=graphicSize(g.template);
  const W=size.width, H=size.height, P=92;

    const grad=ctx.createLinearGradient(0,H*0.45,0,H);grad.addColorStop(0,"rgba(15,13,11,0)");grad.addColorStop(1,"rgba(15,13,11,0.86)");ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

      // captions. Anchor from a safe handle position so multi-line titles rise
      // naturally instead of extending farther into the bottom overlay area.
      const handleY=H-240;
      const titleY=handleY-f.lines.length*lineH-28;
      ctx.fillStyle=acc;roundRect(ctx,P,titleY-30,84,8,4);ctx.fill();
      if(g.headline){ctx.fillStyle="#fff";let y=titleY;ctx.font=`700 ${f.size}px 'Space Grotesk'`;f.lines.forEach(l=>{ctx.fillText(l,P,y);y+=lineH;});}
      ctx.font="500 28px 'IBM Plex Mono'";ctx.fillStyle="rgba(255,255,255,.85)";ctx.fillText(g.handle||"",P,handleY);
      return paint(canvasId);
    }

    // Reel designs stay inside the feed-preview safe area and above Instagram's
    // bottom-left metrics. They vary the treatment without changing the format.
    const style=g.reelStyle||"underline";
    ctx.font=`700 ${f.size}px 'Space Grotesk'`;
    if(style==="panel"){
      const titleY=H-525, handleY=titleY+f.lines.length*lineH+24;
      const panelY=titleY-48, panelH=(handleY-panelY)+76;
      ctx.fillStyle="rgba(15,13,11,.74)";roundRect(ctx,P-30,panelY,W-P*2+60,panelH,28);ctx.fill();
      ctx.fillStyle=acc;roundRect(ctx,P-30,panelY,12,panelH,6);ctx.fill();
      ctx.fillStyle="#fff";let y=titleY;f.lines.forEach(l=>{ctx.fillText(l,P,y);y+=lineH;});
      ctx.font="500 28px 'IBM Plex Mono'";ctx.fillStyle="rgba(255,255,255,.85)";ctx.fillText(g.handle||"",P,handleY);
    }else if(style==="banner"){
      const bandY=H-760, titleY=bandY+58, handleY=titleY+f.lines.length*lineH+22;
      ctx.fillStyle="rgba(15,13,11,.72)";ctx.fillRect(0,bandY,W,Math.max(250,handleY-bandY+68));
      ctx.fillStyle=acc;ctx.fillRect(0,bandY,18,Math.max(250,handleY-bandY+68));
      ctx.fillStyle="#fff";let y=titleY;f.lines.forEach(l=>{ctx.fillText(l,P,y);y+=lineH;});

    }else{
      const titleY=H-366;
      ctx.fillStyle=acc;roundRect(ctx,P,titleY-30,84,8,4);ctx.fill();
      ctx.fillStyle="#fff";let y=titleY;f.lines.forEach(l=>{ctx.fillText(l,P,y);y+=lineH;});
      ctx.font="500 28px 'IBM Plex Mono'";ctx.fillStyle="rgba(255,255,255,.85)";ctx.fillText(g.handle||"",P,H-188);

    return paint(canvasId);
  }

  // text cards: top bar
  ctx.fillStyle=acc; roundRect(ctx,P,P,22,22,5); ctx.fill();
  ctx.font="500 26px 'IBM Plex Mono'"; ctx.fillStyle=muted;
  ctx.fillText((g.handle||g.dept||"").toUpperCase(),P+36,P-2);
  ctx.textAlign="right"; ctx.fillText(new Date().toLocaleDateString(undefined,{month:"short",year:"numeric"}).toUpperCase(),W-P,P-2); ctx.textAlign="left";

  if(g.template==="event"){

    let y=P+100;
    ctx.font="600 30px 'IBM Plex Mono'";ctx.fillStyle=acc;
    ctx.fillText((g.eyebrow||"Event").toUpperCase(),P,y);y+=58;
    if(fig){
      const imageH=300;
      ctx.save();roundRect(ctx,P,y,W-P*2,imageH,18);ctx.clip();coverDraw(ctx,fig,P,y,W-P*2,imageH);ctx.restore();
      ctx.strokeStyle=dark?"rgba(255,255,255,.10)":"rgba(0,0,0,.10)";ctx.lineWidth=2;roundRect(ctx,P,y,W-P*2,imageH,18);ctx.stroke();
      y+=imageH+38;
    }
    const maxHeadlineH=fig?190:350;
    const hf=fitLines(ctx,g.headline||"",{maxW:W-P*2,maxH:maxHeadlineH,weight:"700",family:"'Space Grotesk'",max:fig?70:88,min:40,lh:1.06});
    ctx.fillStyle=fg;ctx.font=`700 ${hf.size}px 'Space Grotesk'`;hf.lines.forEach(l=>{ctx.fillText(l,P,y);y+=hf.size*1.06;});
    if(g.subhead&&!fig){
      y+=18;
      const sf=fitLines(ctx,g.subhead,{maxW:W-P*2,maxH:120,weight:"500",family:"'IBM Plex Sans'",max:38,min:27,lh:1.24});
      ctx.fillStyle=muted;ctx.font=`500 ${sf.size}px 'IBM Plex Sans'`;sf.lines.forEach(l=>{ctx.fillText(l,P,y);y+=sf.size*1.24;});
    }
    const panelY=H-250,panelH=158;
    ctx.fillStyle=dark?"rgba(255,255,255,.07)":"#FFFFFF";roundRect(ctx,P,panelY,W-P*2,panelH,20);ctx.fill();
    ctx.strokeStyle=dark?"rgba(255,255,255,.12)":"rgba(28,27,25,.10)";ctx.lineWidth=2;roundRect(ctx,P,panelY,W-P*2,panelH,20);ctx.stroke();
    ctx.fillStyle=acc;roundRect(ctx,P+28,panelY+30,10,panelH-60,5);ctx.fill();
    ctx.font="600 38px 'Space Grotesk'";ctx.fillStyle=fg;
    ctx.fillText(clip(ctx,g.meta1||"DATE & TIME",W-P*2-92,"600 38px 'Space Grotesk'"),P+66,panelY+28);
    ctx.font="500 29px 'IBM Plex Sans'";ctx.fillStyle=muted;
    ctx.fillText(clip(ctx,g.meta2||g.dept||"",W-P*2-92,"500 29px 'IBM Plex Sans'"),P+66,panelY+86);

  }

  if(g.template==="quote"){
    const qt=g.pull_quote||g.subhead||g.headline||"";
    const f=fitLines(ctx,"\u201C"+qt+"\u201D",{maxW:W-P*2,maxH:560,weight:"500 italic",family:"'Newsreader'",max:84,min:40,lh:1.18});
    ctx.fillStyle=fg; ctx.font=`500 italic ${f.size}px 'Newsreader'`; let y=300; f.lines.forEach(l=>{ctx.fillText(l,P,y);y+=f.size*1.18;});
    ctx.fillStyle=acc; roundRect(ctx,P,H-258,70,7,4); ctx.fill();
    ctx.font="600 34px 'Space Grotesk'"; ctx.fillStyle=fg; ctx.fillText(g.meta1||g.handle||"",P,H-220);
    if(g.meta2){ctx.font="500 28px 'IBM Plex Sans'";ctx.fillStyle=muted;ctx.fillText(g.meta2,P,H-174);}
    return paint(canvasId);
  }

  // paper card
  let cursor=P+92;
  if(g.eyebrow){ctx.font="600 30px 'IBM Plex Mono'";ctx.fillStyle=acc;ctx.fillText(g.eyebrow.toUpperCase(),P,cursor);cursor+=66;}
  const hasFig=!!fig;
  const headMaxH = hasFig?230:430;
  const hf=fitLines(ctx,g.headline||"",{maxW:W-P*2,maxH:headMaxH,weight:"700",family:"'Space Grotesk'",max:hasFig?72:92,min:42,lh:1.07});
  ctx.fillStyle=fg; ctx.font=`700 ${hf.size}px 'Space Grotesk'`; hf.lines.forEach(l=>{ctx.fillText(l,P,cursor);cursor+=hf.size*1.07;});
  cursor+=14;
  if(g.subhead && !hasFig){const sf=fitLines(ctx,g.subhead,{maxW:W-P*2,maxH:200,weight:"500",family:"'IBM Plex Sans'",max:40,min:28,lh:1.3});ctx.fillStyle=muted;ctx.font=`500 ${sf.size}px 'IBM Plex Sans'`;sf.lines.forEach(l=>{ctx.fillText(l,P,cursor);cursor+=sf.size*1.3;});}
  if(hasFig){const fy=Math.max(cursor+10,440),fh=H-fy-220;ctx.save();roundRect(ctx,P,fy,W-P*2,fh,16);ctx.clip();coverDraw(ctx,fig,P,fy,W-P*2,fh);ctx.restore();ctx.strokeStyle=dark?"rgba(255,255,255,.08)":"rgba(0,0,0,.08)";ctx.lineWidth=2;roundRect(ctx,P,fy,W-P*2,fh,16);ctx.stroke();}

function clip(ctx,text,maxW,font){ctx.font=font;if(ctx.measureText(text).width<=maxW)return text;let t=text;while(t.length>1&&ctx.measureText(t+"…").width>maxW)t=t.slice(0,-1);return t+"…";}

function getQueue(){try{return JSON.parse(lsGet("igs2_queue")||"[]");}catch(e){return[];}}
function setQueue(q){lsSet("igs2_queue",JSON.stringify(q));renderQueue();}
async function approve(){
  if(!current)return;
  current.caption=withReviewImageCredit(current.caption);
  const q=getQueue();q.unshift({id:Date.now(),type:current.type,caption:current.caption,hashtags:current.hashtags,alt_text:current.alt_text,date:new Date().toISOString()});setQueue(q);
  const url=(getSettings().publishUrl||"").trim();
  if(url.indexOf("http")===0){
    let img="";const disp=document.getElementById("cardDisp");
    if(disp){try{img=disp.toDataURL("image/jpeg",0.92).split(",")[1];}catch(e){}}
    const fullCaption=current.caption+(current.hashtags.length?"\n\n"+current.hashtags.map(h=>"#"+h).join(" "):"");
    const payload={source:"studio",submitter:"Content Studio",type:(current.type==="reel"?"Video":current.type),title:(currentGraphic&&currentGraphic.headline)||"",caption:fullCaption,details:current.alt_text||"",videoLink:(current.type==="reel"?reelVideoLink:""),imageBase64:img,imageType:"image/jpeg",imageName:((currentGraphic&&currentGraphic.template)||"post")+".jpg",sourceSubmissionId:reviewSource?reviewSource.submissionId:"",consent:true};
    try{await fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});toast(reviewSource?"Approved and marked reviewed ✓":"Sent to the IG publishing queue ✓");}
    catch(e){toast("Saved locally — couldn't reach the queue");}
  } else {
    toast("Approved ✓  (download the graphic too)");
  }
}
function renderQueue(){
  const q=getQueue();document.getElementById("qcount").textContent=q.length?`${q.length} post${q.length>1?"s":""}`:"";
  const list=document.getElementById("qlist");
  if(!q.length){list.innerHTML=`<div class="qempty">A local history appears here after approval. The private Google Sheet remains the authoritative publishing queue.</div>`;return;}
  list.innerHTML="";const labels={paper:"Paper",event:"Event",photo:"Photo",repost:"Repost"};
  q.forEach(item=>{const d=document.createElement("div");d.className="qcard";
    d.innerHTML=`<div class="top"><span class="pill">${labels[item.type]||item.type}</span><span class="qcount">${new Date(item.date).toLocaleDateString()}</span></div><div class="cap">${esc(item.caption)}</div><div class="qacts"><button class="btn sm" data-a="copy">Copy</button><button class="btn ghost sm" data-a="del">Remove</button></div>`;
    d.querySelector('[data-a="copy"]').onclick=()=>copy(item.caption+"\n\n"+(item.hashtags||[]).map(h=>"#"+h).join(" "),"Copied");
    d.querySelector('[data-a="del"]').onclick=()=>setQueue(getQueue().filter(x=>x.id!==item.id));list.appendChild(d);});

function openReviewAuth(){
  modal(`<h2>Connect the private review queue</h2><p>Paste the manager token printed when you ran <code>initializeWorkflow()</code> in Apps Script.</p><label class="fld"><span class="lab">Manager token</span><input type="password" id="reviewToken" autocomplete="off"></label><label style="display:flex;gap:9px;align-items:flex-start;margin:14px 0;cursor:pointer"><input type="checkbox" id="rememberReviewToken" checked style="margin-top:3px"><span><b>Remember on this browser</b><br><span class="hint">Recommended only on your private computer. Uncheck this on a shared device.</span></span></label><div class="out-acts"><button class="btn primary" id="saveReviewToken">Connect</button><button class="btn ghost" id="cancelReview">Cancel</button></div>`);
  document.getElementById("saveReviewToken").onclick=()=>{const token=val("reviewToken");if(!token)return;setManagerToken(token,document.getElementById("rememberReviewToken").checked);closeModal();openReviewQueue();};
  document.getElementById("cancelReview").onclick=closeModal;

async function refreshReviewQueue(){
  const state=document.getElementById("reviewState"),grid=document.getElementById("reviewGrid");if(!state||!grid)return;
  state.textContent="Loading submissions…";grid.innerHTML="";
  try{
    const data=await queueJsonp("list",{});
    if(!data.ok)throw new Error(data.error||"Review queue failed");
    state.textContent=data.items.length?`${data.items.length} submission${data.items.length===1?"":"s"} waiting`:"Nothing is waiting for review.";
    data.items.forEach(item=>{
      const card=document.createElement("div");card.className="review-card";
      card.innerHTML=`<div><span class="pill">${esc(item.type||"Submission")}</span> <span class="qcount">${esc(item.status)}</span></div><h3>${esc(item.title||"Untitled")}</h3><div class="meta">${esc(item.submitter||"Unknown")} · ${item.timestamp?new Date(item.timestamp).toLocaleDateString():""}</div><div class="desc">${esc(item.details||item.credit||"No additional details")}</div><div class="actions">${item.link?`<a class="btn sm" href="${esc(item.link)}" target="_blank" rel="noopener noreferrer">Open source</a>`:""}<button class="btn primary sm" data-a="load">Load into Studio</button><button class="btn sm" data-a="done">Mark reviewed</button><button class="btn ghost sm" data-a="reject">Reject</button></div>`;
      card.querySelector('[data-a="load"]').onclick=()=>loadReviewSubmission(item.submissionId);
      card.querySelector('[data-a="done"]').onclick=()=>reviewStatus(item.submissionId,"Reviewed");
      card.querySelector('[data-a="reject"]').onclick=()=>{if(confirm(`Reject “${item.title||"this submission"}”?`))reviewStatus(item.submissionId,"Rejected");};
      grid.appendChild(card);
    });
  }catch(e){state.innerHTML=`<div class="err">${esc(e.message||e)} If the token was regenerated, choose “Forget manager token” and reconnect.</div>`;}
}
function queueJsonp(action,params){
  const base=(getSettings().publishUrl||"").trim();
  return new Promise((resolve,reject)=>{
    const cb="igsReview_"+Date.now()+"_"+Math.random().toString(36).slice(2);
    const script=document.createElement("script");
    const timer=setTimeout(()=>finish(new Error("The review queue did not respond.")),15000);
    const finish=(err,data)=>{clearTimeout(timer);delete window[cb];script.remove();err?reject(err):resolve(data);};
    window[cb]=data=>finish(null,data);
    const q=new URLSearchParams({action,token:getManagerToken(),callback:cb,...params});
    script.onerror=()=>finish(new Error("Could not reach the review queue."));script.src=base+"?"+q.toString();document.head.appendChild(script);
  });
}
async function reviewStatus(submissionId,status){
  try{
    await fetch((getSettings().publishUrl||"").trim(),{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"managerUpdate",managerToken:getManagerToken(),submissionId,status})});
    setTimeout(refreshReviewQueue,500);toast(`Marked ${status.toLowerCase()} ✓`);
  }catch(e){toast("Could not update that submission");}
}
async function loadReviewSubmission(submissionId){
  const state=document.getElementById("reviewState");if(state)state.textContent="Loading submission and media…";
  try{
    await reviewStatus(submissionId,"Reviewing");
    const data=await queueJsonp("detail",{submissionId});
    if(!data.ok||!data.item)throw new Error(data.error||"Submission could not be loaded");
    applyReviewSubmission(data.item);closeModal();toast("Submission loaded into Studio ✓");
  }catch(e){if(state)state.innerHTML=`<div class="err">${esc(e.message||e)}</div>`;}
}
function applyReviewSubmission(item){
  reviewSource=item;paperMeta=null;photos=[];figure=null;reelCover=null;reelVideoLink="";
  const map={Paper:"paper",Event:"event",Photo:"photo",Video:"reel","Shout-out":"repost"};
  activeType=map[item.type]||"photo";
  const dataUrl=item.imageBase64?`data:${item.imageType||"image/jpeg"};base64,${item.imageBase64}`:"";
  if(dataUrl){
    if(activeType==="photo")photos=[{dataUrl,name:item.imageName||"submission.jpg",mediaType:item.imageType||"image/jpeg"}];
    else if(activeType==="reel")reelCover=dataUrl;
    else figure={dataUrl,name:item.imageName||"submission.jpg",mediaType:item.imageType||"image/jpeg"};
  }
  renderTypes();renderForm();
  const context=[item.title,item.details].filter(Boolean).join("\n\n");
  if(activeType==="paper"){setField("doi",item.link);setField("paperText",context);setField("paperAngle",item.credit);}
  if(activeType==="event"){setField("evTitle",item.title);setField("evDate",item.date);setField("evTime",item.time);setField("evLoc",item.location);setField("evDesc",item.details);setField("evLink",item.link);}
  if(activeType==="photo")setField("photoNote",context);
  if(activeType==="reel"){setField("reelLink",item.videoLink);setField("reelNote",context);reelVideoLink=item.videoLink||"";}
  if(activeType==="repost"){setField("rpHandle",item.credit);setField("rpWhat",context);setField("rpWhy","Submitted by "+(item.submitter||"department member"));}
  window.scrollTo({top:0,behavior:"smooth"});
}

    </div>
    <div class="out-acts" style="margin-top:8px"><button class="btn primary" id="saveSet">Save</button><button class="btn ghost" id="closeM2">Cancel</button></div>`);
  document.getElementById("saveSet").onclick=()=>{saveSettings({dept:val("setDept"),handle:val("setHandle"),voice:val("setVoice"),hashtags:val("setTags"),theme:val("setTheme"),accent:val("setAccent"),length:val("setLen"),model:val("setModel"),logo:s.logo,publishUrl:val("setPublish")});toast("Saved ✓");closeModal();};
  document.getElementById("closeM2").onclick=closeModal;
}
function modal(html,wide=false){const s=document.createElement("div");s.className="scrim";s.id="scrim";s.innerHTML=`<div class="modal${wide?" wide":""}">${html}</div>`;s.onclick=e=>{if(e.target===s)closeModal();};document.body.appendChild(s);}
function closeModal(){const s=document.getElementById("scrim");if(s)s.remove();}

/* ===== utils ===== */
function val(id){const e=document.getElementById(id);return e?(e.value||"").trim():"";}
function extractDriveFileId(input){
  const s=String(input||"").trim();
  if(/^[A-Za-z0-9_-]{20,}$/.test(s))return s;
  const path=s.match(/\/file\/d\/([A-Za-z0-9_-]{20,})/);
  if(path)return path[1];
  const query=s.match(/[?&]id=([A-Za-z0-9_-]{20,})/);
  return query?query[1]:"";
}
function esc(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function copy(t,m){navigator.clipboard.writeText(t).then(()=>toast(m)).catch(()=>toast("Copy failed"));}
let toastTimer;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2400);}

/* ===== init ===== */
document.getElementById("draftBtn").onclick=draft;
document.getElementById("reviewBtn").onclick=openReviewQueue;
document.getElementById("keyBtn").onclick=openKeyModal;
document.getElementById("settingsBtn").onclick=openSettings;
renderTypes();renderForm();renderQueue();applyBranding();ensureFonts();
if(!getApiKey())setTimeout(openKeyModal,400);
</script>
